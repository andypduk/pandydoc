<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2C5F8A"/>
    </linearGradient>
  </defs>
  
  <!-- Full square background - macOS applies squircle mask -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  
  <!-- Rounder, wider head - scaled up and centered -->
  <ellipse cx="512" cy="540" rx="380" ry="360" fill="white"/>
  
  <!-- Bigger, fluffier ears -->
  <circle cx="280" cy="300" r="130" fill="#1a1a1a"/>
  <circle cx="280" cy="300" r="70" fill="#333"/>
  <circle cx="744" cy="300" r="130" fill="#1a1a1a"/>
  <circle cx="744" cy="300" r="70" fill="#333"/>
  
  <!-- Larger, more dramatic eye patches -->
  <ellipse cx="380" cy="520" rx="140" ry="100" fill="#1a1a1a" transform="rotate(-15 380 520)"/>
  <ellipse cx="644" cy="520" rx="140" ry="100" fill="#1a1a1a" transform="rotate(15 644 520)"/>
  
  <!-- Bigger eyes -->
  <circle cx="380" cy="510" r="58" fill="white"/>
  <circle cx="644" cy="510" r="58" fill="white"/>
  <circle cx="392" cy="504" r="32" fill="#1a1a1a"/>
  <circle cx="656" cy="504" r="32" fill="#1a1a1a"/>
  <circle cx="400" cy="492" r="14" fill="white"/>
  <circle cx="664" cy="492" r="14" fill="white"/>
  
  <!-- Wider, cuter nose -->
  <ellipse cx="512" cy="630" rx="48" ry="32" fill="#1a1a1a"/>
  <ellipse cx="512" cy="624" rx="18" ry="10" fill="#333" opacity="0.5"/>
  
  <!-- Bigger smile -->
  <path d="M440 680 Q512 750 584 680" stroke="#1a1a1a" stroke-width="14" fill="none" stroke-linecap="round"/>
  
  <!-- Pink cheeks -->
  <circle cx="300" cy="660" r="48" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="724" cy="660" r="48" fill="#FFB6C1" opacity="0.5"/>
</svg>
